<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js</title>
    <style>
        input{
            width: 100px;
            height: 30px;
            border-radius: 0;
            padding: 0;
        }
        .color-theme{
            margin-top: 30px;
            width: 300px;
            height: 200px;
            border: 1px black solid;
            text-align: center;
            line-height: 200px;
        }
        .btn-clear{
            padding: 6px;
            background-color: rgb(255, 91, 105);
            border: none;
            color: white;
        }
    </style>
</head>
<body>
    <h1 class="">Interactive Color bicker</h1>

    <label >Chose your Color</label>
    <input type="color" class="color">

    <div class="color-theme"> COlor </div>

    <h3>Color History</h3>
    <ul class="list-colors"></ul>
    <button class="btn-clear">Clear History</button>



    <script src="main.js"></script>
</body>
</html>
